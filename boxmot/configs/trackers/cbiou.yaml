# ════════════════════════════════════════════════════════
# 論文明確定義的參數 (控制 C-BIoU 演算法的基礎擴張與預測)
# ════════════════════════════════════════════════════════

# b1: 第一階段小緩衝比例
# [邏輯] 軌跡框向外擴張「寬度與高度」的倍率。主要用於匹配連續穩定出現的目標。
# [舉例] b1=0.4 時，一台寬度 100px 的車，會向外擴張 40px (100 * 0.4)。
b1:
  type: uniform
  default: 0.4
  range: [0.1, 0.7]

# b2: 第二階段大緩衝比例 (規則上必須 b2 > b1)
# [邏輯] 當第一階段匹配失敗（可能因為突然加速、急轉彎），用更大的網子去撈。
# [舉例] b2=0.8 時，同一台寬度 100px 的車，如果第一階段沒配對到，第二階段會撒出 80px 的大網子去抓它。
b2:
  type: uniform
  default: 0.8
  range: [0.2, 1.5]

# n_motion: 平均速度計算的參考歷史幀數
# [邏輯] 決定系統預測車輛走向時，要回看過去幾幀。
# [舉例] 設為 5：參考過去 5 幀。如果路口車輛「急煞急停」很頻繁，數值可以調小（例如 2 或 3），讓系統對速度變化的反應更靈敏，才不會煞車了預測框還往前衝。
n_motion:
  type: qrandint
  default: 5
  range: [2, 6, 1]

# track_buffer: 軌跡最大保留幀數 (無敵星星時間)
# [邏輯] 車輛在畫面上消失（被遮擋或停紅燈）後，ID 要保留多久才銷毀。
# [舉例] 設為 3600：如果影片是 30 FPS，3600 幀等於 120 秒。這能完美涵蓋一個超長紅綠燈的時間，確保大車擋住小機車 1 分鐘後，小機車出現還是同一個 ID。
track_buffer:
  type: qrandint
  default: 3600

# ════════════════════════════════════════════════════════
# 框架工程參數 (控制 YOLO 偵測與軌跡的生殺大權)
# ════════════════════════════════════════════════════════

# frame_rate: 影片的每秒幀數 (FPS)
# [邏輯] 用來輔助換算 track_buffer 的真實物理秒數。
frame_rate:
  type: choice
  default: 15

# min_conf: YOLO 偵測框的最低信心度門檻
# [邏輯] 低於這個分數的偵測框會被當成雜訊，直接過濾掉不進追蹤系統。
# [舉例] 設為 0.1：代表 YOLO 只有不到 10% 把握的物件（可能是地上的影子）就不處理。
min_conf:
  type: uniform
  default: 0.1
  range: [0.01, 0.3]

# track_thresh: 新軌跡的誕生門檻
# [邏輯] 當畫面出現一個無法跟現有 ID 匹配的新物件時，需要多高的信心度才配發「全新 ID」。
# [舉例] 設為 0.45：代表這台車 YOLO 必須有 45% 以上的把握，系統才會給它新 ID (例如 ID=22)。避免把雜訊誤認為新車。
track_thresh:
  type: uniform
  default: 0.45
  range: [0.2, 0.6]

# match_thresh: 匈牙利算法的「配對及格線」
# [邏輯] Cost(代價) = 1 - BIoU + 其他懲罰。如果算出來的 Cost 高於這個值，系統寧願讓他斷線，也不要把他們配在一起。
# [舉例] 設為 0.75：因為我們加了底部距離、拓撲等懲罰項，Cost 很容易變高，所以這個容忍值要設得比純 BIoU 時稍微寬鬆一點。
match_thresh:
  type: uniform
  default: 0.75
  range: [0.5, 0.95]

# min_hits: 軌跡確認所需的連續命中次數
# [邏輯] 新 ID 誕生後，要連續被追蹤到幾幀，系統才承認它是「穩定車輛」並輸出到結果中。
# [舉例] 設為 2：連續看到 2 幀才輸出，防堵那種只閃現 1 幀就消失的幽靈雜訊。
min_hits:
  type: qrandint
  default: 2
  range: [1, 3, 1]

# ════════════════════════════════════════════════════════
# 🚀 緩衝區絕對像素限制 (解決大車黑洞與遠處小車追丟)
# ════════════════════════════════════════════════════════

# min_buf_px: 小車的「安全保底網子」
# [邏輯] 無論車子多小，擴張的緩衝區絕對不能低於這個像素值，用來吸收 YOLO 天生的框抖動。
# [舉例] 設為 40.0：遠處小機車寬度才 15px，原本 b1=0.4 只能擴張 6px，YOLO 一抖動就追丟了。有了這個保底，強迫給它 40px 的大網子，穩穩接住。
min_buf_px:
  type: uniform
  default: 40.0
  range: [20.0, 60.0]

# max_buf_px: 大車的「防黑洞天花板」
# [邏輯] 無論車子多大，擴張的緩衝區絕對不能超過這個值，防止大車的緩衝區吃掉旁邊的機車 ID。
# [舉例] 設為 80.0：大公車寬度 600px，若照 b2=0.8 會擴張到 480px，變成一個跨越三車道的黑洞。有了天花板，強迫壓在 80px，不會干擾隔壁車道。
max_buf_px:
  type: uniform
  default: 80.0
  range: [60.0, 150.0]

# ════════════════════════════════════════════════════════
# 靜止偵測 & delta 上限 (專治停紅燈的預測飄移)
# ════════════════════════════════════════════════════════

# max_delta: 預測步數的「最遠煞車距離」
# [邏輯] 當車輛被遮擋(Lost)，預測框最多只能用最後的速度往前推算幾幀，超過就凍結在原地。
# [舉例] 設為 3：機車騎進公車死角，預測框往前走 3 步後就會停住。如果不設這個，等紅燈 120 秒，預測框會一直往前走 3600 步飛出畫面，永遠配對不回來。
max_delta:
  type: qrandint
  default: 3
  range: [2, 5, 1]

# static_ratio: 靜止判定門檻
# [邏輯] 當車輛每幀的位移量小於「車框對角線」的這個比例，強制判定速度為 0。
# [舉例] 設為 0.02：車輛停紅燈時，YOLO 框會有微小抖動，會被誤算成有 2px 的速度。只要低於 0.02 比例，系統直接鎖死速度 = 0，預測框就乖乖釘在原地不飄走。
static_ratio:
  type: uniform
  default: 0.02
  range: [0.005, 0.05]

# ════════════════════════════════════════════════════════
# 物理與幾何懲罰項 (解決擁擠重疊、ID 互換與對向車道幽靈)
# ════════════════════════════════════════════════════════

# lambda_bcd: 底部中心點距離懲罰權重 (Bottom-Center Distance)
# [邏輯] 機車群並排時，BBOX 上半部幾乎完全重疊，依賴「輪胎接地點」來分辨誰是誰。
# [舉例] 設為 0.15：當兩台車 BIoU 算出來分數一樣時，靠輪胎距離來扣分（Tie-breaker），成功把擠在一起的車陣拆解。
lambda_bcd:
  type: uniform
  default: 0.15
  range: [0.05, 0.3]

# lambda_topo: 拓撲軟懲罰權重 (Topology Penalty)
# [邏輯] 停紅燈時，左邊的車就在左邊，右邊的車就在右邊，不應該發生橫跨交錯。
# [舉例] 設為 0.1：如果系統企圖把左邊機車的 ID 派給右邊的偵測框，就會觸發「橫越扣分」，強迫演算法維持紅燈停等時的相對隊形。
lambda_topo:
  type: uniform
  default: 0.1
  range: [0.03, 0.2]

# topo_speed_thresh: 「低速拓撲鎖定」與「對向車道防護」的速度分水嶺
# [邏輯] 決定多少車速 (像素/幀) 以下算「低速/轉彎/停等」，多少以上算「高速/直行」。
# [舉例] 設為 5.0：
#   1. 低於 5.0 px/frame：開啟拓撲懲罰（維持隊形），關閉錐體約束（允許轉彎大角度）。
#   2. 高於 5.0 px/frame：關閉拓撲懲罰（允許超車/變換車道），開啟錐體約束（防堵北上高速車輛消失時，ID 被對向南下車輛偷走）。
topo_speed_thresh:
  type: uniform
  default: 5.0
  range: [2.0, 15.0]