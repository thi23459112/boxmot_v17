# FastTracker parameter configuration
# Default values based on configs/004_default.json

det_thresh:
  default: 0.7
  help: "Detection confidence threshold. FastTracker default is 0.7."

track_buffer:
  default: 30
  help: "Number of frames to buffer when a track is lost."

match_thresh:
  default: 0.85
  help: "Threshold for matching tracks with detections (1 - IoU)."

frame_rate:
  default: 30
  help: "Frame rate of the input video, used to calculate buffer size."

# FastTracker specific parameters
reset_velocity_offset_occ:
  default: 5
  help: "Number of frames to look back to reset velocity when occlusion is detected."

reset_pos_offset_occ:
  default: 3
  help: "Number of frames to look back to reset position when occlusion is detected."

enlarge_bbox_occ:
  default: 1.1
  help: "Factor to enlarge the bounding box when occlusion is first detected."

dampen_motion_occ:
  default: 0.89
  help: "Factor to dampen the velocity during occlusion."

active_occ_to_lost_thresh:
  default: 10
  help: "Number of frames an occluded track stays active before being marked as lost."

init_iou_suppress:
  default: 0.8
  help: "IoU threshold to suppress initialization of new tracks that overlap with active ones."

roi_repair_max_gap:
  default: 15
  help: "Maximum gap (in frames) to repair trajectory segments that briefly leave the ROI."

dir_window_N:
  default: 10
  help: "Window size (frames) for calculating direction consistency."